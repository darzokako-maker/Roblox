name: Build Executor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [x64, x86]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}
    
    - name: Compile Resource
      shell: cmd
      run: rc.exe /fo resource.res resource.rc
    
    - name: Compile Executor
      shell: cmd
      run: |
        cl.exe ^
          /EHsc /MT /O2 /Ob2 /Oi /Ot /GL /Gy ^
          /DNDEBUG /DUNICODE /D_UNICODE ^
          /D_CRT_SECURE_NO_WARNINGS ^
          /D_SILENCE_ALL_CXX17_DEPRECATION_WARNINGS ^
          /Gs9999999 ^
          /Fe:executor_${{ matrix.arch }}.exe ^
          src/main.cpp resource.res ^
          /link ^
          kernel32.lib user32.lib advapi32.lib shell32.lib ^
          ole32.lib oleaut32.lib comctl32.lib gdi32.lib psapi.lib ^
          /MERGE:.rdata=.text ^
          /MERGE:.pdata=.text ^
          /OPT:REF /OPT:ICF ^
          /LTCG ^
          /SUBSYSTEM:WINDOWS
          
    - name: Package
      shell: cmd
      run: |
        powershell -Command "Compress-Archive -Path executor_${{ matrix.arch }}.exe,src/exploit.dll -DestinationPath Executor_${{ matrix.arch }}.zip"
        
    - uses: actions/upload-artifact@v4
      with:
        name: Executor-${{ matrix.arch }}
        path: Executor_${{ matrix.arch }}.zip
        retention-days: 90
