name: Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: ilammy/msvc-dev-cmd@v1
    
    - name: Build
      shell: cmd
      run: |
        rc.exe /fo resource.res resource.rc
        cl.exe /EHsc /MT /O2 /DNDEBUG /DUNICODE /D_UNICODE /D_CRT_SECURE_NO_WARNINGS /Fe:executor.exe src/main.cpp resource.res /link kernel32.lib user32.lib advapi32.lib shell32.lib ole32.lib oleaut32.lib comctl32.lib gdi32.lib psapi.lib comdlg32.lib /SUBSYSTEM:WINDOWS

    - uses: actions/upload-artifact@v4
      with:
        name: Executor
        path: executor.exe
