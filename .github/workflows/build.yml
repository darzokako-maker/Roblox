name: Build Executor
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    - name: Build
      run: msbuild RobloxExecutor.sln /p:Configuration=Release /p:Platform="Any CPU"
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Executor-Programi
        path: .\\RobloxExecutor\\bin\\Release\\
        
